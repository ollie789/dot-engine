<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Configurator HUD v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060a;
    color: #888;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Scan line overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ---- TOP BAR ---- */
  .top-bar {
    height: 52px;
    background: rgba(8, 8, 14, 0.95);
    border-bottom: 1px solid rgba(74, 158, 255, 0.15);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    position: relative;
    z-index: 10;
  }

  .top-bar::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(74, 158, 255, 0.3) 20%, rgba(74, 158, 255, 0.1) 50%, rgba(255, 107, 74, 0.3) 80%, transparent 100%);
  }

  .brand-id {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-id .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4a9eff;
    box-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .brand-id .name {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .separator {
    width: 1px;
    height: 24px;
    background: rgba(255, 255, 255, 0.08);
  }

  .context-tabs {
    display: flex;
    gap: 3px;
  }

  .context-tab {
    padding: 7px 16px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.25);
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }

  .context-tab:hover {
    color: rgba(255, 255, 255, 0.5);
    border-color: rgba(74, 158, 255, 0.15);
  }

  .context-tab.active {
    color: #4a9eff;
    border-color: rgba(74, 158, 255, 0.3);
    background: rgba(74, 158, 255, 0.05);
  }

  .context-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 20%;
    right: 20%;
    height: 2px;
    background: #4a9eff;
    box-shadow: 0 0 8px rgba(74, 158, 255, 0.5);
  }

  .meta-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.15);
    letter-spacing: 1px;
  }

  .dot-count {
    color: rgba(74, 158, 255, 0.4);
    font-variant-numeric: tabular-nums;
  }

  .fps {
    color: rgba(74, 255, 140, 0.3);
  }

  /* ---- CANVAS AREA ---- */
  .canvas-area {
    flex: 1;
    background: #06060a;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fake-dotfield {
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%,
      rgba(255, 107, 74, 0.6) 0%,
      rgba(45, 122, 74, 0.5) 30%,
      rgba(45, 122, 74, 0.2) 50%,
      transparent 65%
    );
    filter: blur(1px);
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.03); opacity: 0.9; }
  }

  .corner-mark {
    position: absolute;
    width: 28px;
    height: 28px;
    opacity: 0.15;
  }
  .corner-mark.tl { top: 16px; left: 16px; border-top: 1px solid #4a9eff; border-left: 1px solid #4a9eff; }
  .corner-mark.tr { top: 16px; right: 16px; border-top: 1px solid #4a9eff; border-right: 1px solid #4a9eff; }
  .corner-mark.bl { bottom: 64px; left: 16px; border-bottom: 1px solid #4a9eff; border-left: 1px solid #4a9eff; }
  .corner-mark.br { bottom: 64px; right: 16px; border-bottom: 1px solid #4a9eff; border-right: 1px solid #4a9eff; }

  .crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    pointer-events: none;
    opacity: 0.06;
  }
  .crosshair::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #4a9eff;
  }
  .crosshair::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #4a9eff;
  }

  /* ---- BOTTOM BAR ---- */
  .bottom-bar {
    height: 56px;
    background: rgba(8, 8, 14, 0.95);
    border-top: 1px solid rgba(74, 158, 255, 0.1);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    position: relative;
    z-index: 10;
  }

  .bottom-bar::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255, 107, 74, 0.2) 30%, rgba(74, 158, 255, 0.15) 70%, transparent 100%);
  }

  .color-swatches {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .swatch {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    cursor: pointer;
    transition: all 0.2s;
  }

  .swatch:hover {
    border-color: rgba(255, 255, 255, 0.3);
    transform: scale(1.1);
  }

  .swatch.active {
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
  }

  .param-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 130px;
  }

  .param-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.2);
    display: flex;
    justify-content: space-between;
  }

  .param-value {
    color: rgba(74, 158, 255, 0.5);
  }

  .param-track {
    height: 4px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }

  .param-fill {
    height: 100%;
    border-radius: 2px;
    position: absolute;
    left: 0;
    top: 0;
    transition: width 0.3s;
  }

  .param-fill.energy { width: 60%; background: linear-gradient(90deg, rgba(74, 158, 255, 0.4), rgba(74, 158, 255, 0.7)); }
  .param-fill.organic { width: 80%; background: linear-gradient(90deg, rgba(74, 255, 140, 0.3), rgba(74, 255, 140, 0.6)); }
  .param-fill.density { width: 50%; background: linear-gradient(90deg, rgba(255, 107, 74, 0.3), rgba(255, 107, 74, 0.6)); }

  .param-thumb {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    position: absolute;
    top: -3px;
    transform: translateX(-50%);
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    cursor: grab;
  }

  .param-thumb.energy { left: 60%; background: rgba(74, 158, 255, 0.8); box-shadow: 0 0 8px rgba(74, 158, 255, 0.4); }
  .param-thumb.organic { left: 80%; background: rgba(74, 255, 140, 0.6); box-shadow: 0 0 8px rgba(74, 255, 140, 0.3); }
  .param-thumb.density { left: 50%; background: rgba(255, 107, 74, 0.6); box-shadow: 0 0 8px rgba(255, 107, 74, 0.3); }

  .motion-select {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .motion-opt {
    padding: 5px 12px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.2);
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .motion-opt:hover {
    color: rgba(255, 255, 255, 0.4);
    border-color: rgba(255, 107, 74, 0.15);
  }

  .motion-opt.active {
    color: rgba(255, 107, 74, 0.7);
    border-color: rgba(255, 107, 74, 0.25);
    background: rgba(255, 107, 74, 0.05);
  }

  .bottom-right {
    margin-left: auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .action-btn {
    padding: 7px 18px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid rgba(74, 158, 255, 0.2);
    background: rgba(74, 158, 255, 0.05);
    color: rgba(74, 158, 255, 0.6);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover {
    border-color: rgba(74, 158, 255, 0.4);
    background: rgba(74, 158, 255, 0.1);
    color: rgba(74, 158, 255, 0.9);
    box-shadow: 0 0 12px rgba(74, 158, 255, 0.1);
  }

  .action-btn.primary {
    border-color: rgba(74, 255, 140, 0.3);
    background: rgba(74, 255, 140, 0.08);
    color: rgba(74, 255, 140, 0.7);
  }

  .action-btn.primary:hover {
    border-color: rgba(74, 255, 140, 0.5);
    color: rgba(74, 255, 140, 0.95);
    box-shadow: 0 0 12px rgba(74, 255, 140, 0.15);
  }
</style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="brand-id">
      <div class="dot"></div>
      <span class="name">Acme Corp</span>
    </div>

    <div class="separator"></div>

    <div class="context-tabs">
      <div class="context-tab active">Logo</div>
      <div class="context-tab">Hero</div>
      <div class="context-tab">Loading</div>
      <div class="context-tab">Banner</div>
      <div class="context-tab">Data</div>
    </div>

    <div class="meta-right">
      <span class="dot-count">64K DOTS</span>
      <span class="fps">60 FPS</span>
      <span>v0.8</span>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div class="corner-mark tl"></div>
    <div class="corner-mark tr"></div>
    <div class="corner-mark bl"></div>
    <div class="corner-mark br"></div>
    <div class="crosshair"></div>
    <div class="fake-dotfield"></div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="color-swatches">
      <div class="swatch active" style="background: #2D7A4A;"></div>
      <div class="swatch" style="background: #E07A5F;"></div>
      <div class="swatch" style="background: #0a0a0a;"></div>
    </div>

    <div class="separator"></div>

    <div class="param-group">
      <div class="param-label">Energy <span class="param-value">0.60</span></div>
      <div class="param-track">
        <div class="param-fill energy"></div>
        <div class="param-thumb energy"></div>
      </div>
    </div>

    <div class="param-group">
      <div class="param-label">Organic <span class="param-value">0.80</span></div>
      <div class="param-track">
        <div class="param-fill organic"></div>
        <div class="param-thumb organic"></div>
      </div>
    </div>

    <div class="param-group">
      <div class="param-label">Density <span class="param-value">0.50</span></div>
      <div class="param-track">
        <div class="param-fill density"></div>
        <div class="param-thumb density"></div>
      </div>
    </div>

    <div class="separator"></div>

    <div class="motion-select">
      <div class="motion-opt active">Flow</div>
      <div class="motion-opt">Breathe</div>
      <div class="motion-opt">Pulse</div>
      <div class="motion-opt">None</div>
    </div>

    <div class="bottom-right">
      <div class="action-btn">Export</div>
      <div class="action-btn primary">Apply</div>
    </div>
  </div>

</body>
</html>
